<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PALO — Creative Company</title>

  <style>
    /* ── TIPOGRAFÍAS LOCALES ─────────────────────────────────── */
    @font-face {
      font-family: 'Religath';
      src: url('Assets/RELIGATH-Demo.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'InstrumentSerif';
      src: url('Assets/InstrumentSerif-Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'InstrumentSerif';
      src: url('Assets/InstrumentSerif-Italic.ttf') format('truetype');
      font-weight: 400;
      font-style: italic;
      font-display: swap;
    }
    @font-face {
      font-family: 'Inter';
      src: url('Assets/Inter-Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Inter';
      src: url('Assets/Inter-Bold.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Inter';
      src: url('Assets/Inter-Black.ttf') format('truetype');
      font-weight: 900;
      font-style: normal;
      font-display: swap;
    }

    /* ── RESET + VARIABLES ──────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:      #0a0a0a;
      --white:      #ffffff;
      --gray-light: #f5f5f5;
      --gray-text:  #888;
      --f-display:  'Religath', Georgia, serif;
      --f-serif:    'InstrumentSerif', Georgia, serif;
      --f-sans:     'Inter', system-ui, sans-serif;
      --guide:      rgba(220, 30, 30, 0.8);
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: var(--f-sans);
      background: var(--black);
      color: var(--white);
      overflow-x: hidden;
    }

    /* ── GUIDE LINE 600px ───────────────────────────────────── */
    .guide {
      position: absolute;
      top: 700px; left: 0; right: 0;
      border-top: 1px dashed var(--guide);
      z-index: 999; pointer-events: none;
    }
    .guide::after {
      content: '700px';
      position: absolute; right: 14px; top: -16px;
      font-size: 10px; font-family: var(--f-sans); font-weight: 400;
      color: var(--guide); letter-spacing: 0.06em;
    }

    /* ── FADE UP ────────────────────────────────────────────── */
    .fade-up {
      opacity: 0; transform: translateY(18px);
      transition: opacity 0.7s ease-out, transform 0.7s ease-out;
    }
    .fade-up.visible { opacity: 1; transform: none; }


    /* ════════════════════════════════════════════════════════
       NAVBAR
    ════════════════════════════════════════════════════════ */
    .navbar {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 22px 52px;
      display: flex; align-items: center; justify-content: space-between;
      /* transición unificada: fondo + padding + slide vertical */
      transition:
        background   0.45s ease,
        padding      0.45s ease,
        transform    0.45s cubic-bezier(0.4, 0, 0.2, 1),
        box-shadow   0.45s ease;
    }
    .navbar.scrolled {
      background: rgba(10,10,10,0.92);
      padding: 14px 52px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 1px 0 rgba(255,255,255,0.04);
    }
    /* Ocultar al hacer scroll hacia abajo */
    .navbar.hidden {
      transform: translateY(-110%);
    }

    /* Logo: PNG blanco sobre transparente — sin filtros */
    .navbar__logo {
      display: block;
      height: 40px; width: auto;
      transition: opacity 0.2s;
    }
    .navbar__logo:hover { opacity: 0.65; }

    .navbar__links {
      display: flex; align-items: center; gap: 44px; list-style: none;
    }
    .navbar__links a {
      font-family: var(--f-sans);
      font-size: 11px; font-weight: 400;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: rgba(255,255,255,0.78);
      text-decoration: none;
      position: relative; padding-bottom: 3px;
      transition: color 0.25s;
    }
    .navbar__links a::after {
      content: '';
      position: absolute; bottom: 0; left: 0;
      width: 0; height: 1px;
      background: var(--white);
      transition: width 0.3s ease-out;
    }
    .navbar__links a:hover { color: var(--white); }
    .navbar__links a:hover::after { width: 100%; }

    .nav-cta {
      color: var(--white) !important;
      font-weight: 500 !important;
      border-bottom: 1px solid rgba(255,255,255,0.55);
    }
    .nav-cta::after { display: none !important; }
    .nav-cta:hover { border-bottom-color: var(--white) !important; }


    /* ════════════════════════════════════════════════════════
       HERO
    ════════════════════════════════════════════════════════ */
    .hero {
      position: relative;
      height: 700px;
      max-height: 700px;
      overflow: hidden;
    }

    /* z:0 — Fondo texturado */
    .hero__bg {
      position: absolute; inset: 0; z-index: 0;
      background:
        url('Assets/fondo-palo.png') center/cover no-repeat,
        linear-gradient(135deg, #2e2e2e 0%, #1e1e1e 50%, #111 100%);
    }

    /* z:1 — Wrapper full-hero para centrar PALO con flexbox (más fiable que translate) */
    .hero__title-wrap {
      position: absolute;
      inset: 0;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .hero__title {
      font-family: var(--f-display);
      font-size: clamp(207px, 25vw, 370px);
      font-weight: 400;
      line-height: 1;
      letter-spacing: -0.01em;
      color: var(--white);
      text-align: center;
      white-space: nowrap;
      user-select: none;
      margin-bottom: 150px; /* sube 150px desde el centro */
    }

    /* z:2 — Wrapper centrado para el perro (flex = sin transform, sin blend) */
    .hero__dog-wrap {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      justify-content: center;
      align-items: flex-end; /* sentado en la base del módulo */
      pointer-events: none;
    }

    .hero__dog {
      height: 78%;
      width: auto;
      display: block;
      /* Sin filtros ni blend — PNG tal cual */
    }

    /* z:3 — Barra inferior: EST. | Creative Company | BUILD. RUN. GROW.
       Todos en la misma línea horizontal, a la misma altura */
    .hero__bottom {
      position: absolute;
      bottom: 132px; left: 0; right: 0;
      padding: 0 7%;        /* ~95px en 1366px — más adentro que 52px fijo */
      z-index: 3;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }

    .hero__bottom-item {
      font-family: var(--f-sans);
      font-size: 10px; font-weight: 400;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: rgba(255,255,255,0.62);
      white-space: nowrap;
    }

    /* "Creative Company" centrado, +20% */
    .hero__bottom-center {
      font-family: var(--f-serif);
      font-style: italic;
      font-size: clamp(34px, 4.2vw, 58px);
      font-weight: 400;
      letter-spacing: 0.01em;
      text-transform: none;
      color: var(--white);
      text-align: center;
      flex: 1;
      padding: 0 24px;
    }


    /* ════════════════════════════════════════════════════════
       PROYECTO: FRANUÍ
    ════════════════════════════════════════════════════════ */
    .project {
      position: relative;
      background: var(--gray-light);
      min-height: 580px; max-height: 620px;
      display: grid; grid-template-columns: 45% 55%;
      overflow: hidden;
      opacity: 0;
      transform: translateY(32px);
      transition: opacity 0.8s ease-out, transform 0.8s ease-out;
    }
    .project.visible { opacity: 1; transform: none; }

    .project__left {
      display: flex; flex-direction: column; justify-content: center;
      padding: 56px 48px 56px 56px;
      color: var(--black);
    }

    .project__eyebrow {
      font-family: var(--f-sans); font-size: 10px; font-weight: 400;
      letter-spacing: 0.28em; text-transform: uppercase;
      color: var(--gray-text); margin-bottom: 18px;
    }

    .project__client {
      font-family: var(--f-serif);
      font-size: clamp(50px, 5.5vw, 76px);
      font-weight: 400; line-height: 0.95;
      letter-spacing: -0.02em; color: var(--black);
      margin-bottom: 20px;
    }

    .project__desc {
      font-family: var(--f-sans); font-size: 13px; font-weight: 400;
      line-height: 1.7; color: #555;
      max-width: 300px; margin-bottom: 28px;
    }

    .project__metric-block { margin-bottom: 28px; }
    .project__metric {
      font-family: var(--f-serif);
      font-size: clamp(44px, 4.5vw, 64px);
      font-weight: 400; color: var(--black); line-height: 1;
    }
    .project__metric-label {
      font-family: var(--f-sans); font-size: 12px; font-weight: 400;
      line-height: 1.5; color: #666; margin-top: 6px;
    }

    .project__tags { display: flex; gap: 8px; }
    .tag {
      font-family: var(--f-sans); font-size: 10px; font-weight: 400;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--black); border: 1px solid rgba(0,0,0,0.3);
      padding: 6px 16px; border-radius: 100px;
    }

    /* Columna derecha — imagen con padding y border-radius (como Figma) */
    .project__right {
      position: relative;
      padding: 28px 36px 28px 16px;
      display: flex; align-items: stretch;
    }

    .project__img-wrap {
      position: relative;
      width: 100%; border-radius: 20px;
      overflow: hidden; flex-shrink: 0;
    }

    .project__img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      transition: transform 0.9s ease-out;
    }
    .project__img-wrap:hover .project__img { transform: scale(1.03); }

    /* "ver más →" centrado, serif italic, sin caja negra */
    .project__pill {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      font-family: var(--f-serif);
      font-style: italic;
      font-size: clamp(22px, 2.2vw, 32px);
      color: var(--white);
      text-decoration: none;
      white-space: nowrap;
      text-shadow: 0 2px 14px rgba(0,0,0,0.4);
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: auto;
    }
    .project__pill:hover {
      opacity: 0.8;
      transform: translate(-50%, -50%) scale(1.04);
    }

    /* ── Mobile ─────────────────────────────────────────── */
    @media (max-width: 768px) {
      .navbar { padding: 18px 24px; }
      .navbar.scrolled { padding: 12px 24px; }
      .navbar__links { gap: 20px; }

      .hero { height: auto; min-height: 480px; }
      .hero__title { font-size: clamp(100px, 24vw, 200px); }
      .hero__dog { height: 65%; }
      .hero__bottom { left: 24px; right: 24px; bottom: 20px; }
      .hero__bottom-center { font-size: clamp(22px, 6vw, 36px); }

      .project { grid-template-columns: 1fr; max-height: none; min-height: auto; }
      .project__left { padding: 40px 24px; }
      .project__right { min-height: 320px; }
    }
  </style>
</head>
<body>

  <!-- ══ NAVBAR ════════════════════════════════════════════ -->
  <nav class="navbar" id="navbar">
    <a href="#hero">
      <img class="navbar__logo" src="Assets/logo-perrito.png" alt="PALO">
    </a>
    <ul class="navbar__links">
      <li><a href="#">Work</a></li>
      <li><a href="#">Palo's Way</a></li>
      <li><a href="#" class="nav-cta">Get in Touch</a></li>
    </ul>
  </nav>

  <!-- ══ HERO ══════════════════════════════════════════════ -->
  <section class="hero" id="hero">

    <!-- z:0 fondo textura -->
    <div class="hero__bg"></div>
    <!-- guía 600px -->
    <div class="guide"></div>

    <!-- z:1 — PALO gigante, centrado con flex wrapper -->
    <div class="hero__title-wrap">
      <h1 class="hero__title fade-up" style="transition-delay:0s">PALO</h1>
    </div>

    <!-- z:2 — Perro centrado con flex wrapper (sin blend mode ni filtros) -->
    <div class="hero__dog-wrap">
      <img
        class="hero__dog fade-up"
        src="Assets/perro.png"
        alt=""
        aria-hidden="true"
        style="transition-delay:0.12s"
      >
    </div>

    <!-- z:3 — Barra inferior: EST. | Creative Company | BUILD. RUN. GROW. -->
    <div class="hero__bottom">
      <span class="hero__bottom-item">Est. 2011</span>
      <span class="hero__bottom-center fade-up" style="transition-delay:0.22s">
        Creative Company
      </span>
      <span class="hero__bottom-item">Build. Run. Grow.</span>
    </div>

  </section>

  <!-- ══ PROYECTO: FRANUÍ ══════════════════════════════════ -->
  <section class="project" id="franui">
    <div class="guide"></div>

    <div class="project__left">
      <p class="project__eyebrow">Selected work — 2024</p>
      <h2 class="project__client">Franuí</h2>
      <p class="project__desc">
        Rebrand y sistema de marca para escalar fuera de Argentina.
      </p>
      <div class="project__metric-block">
        <div class="project__metric">38%</div>
        <p class="project__metric-label">Recall espontáneo<br>en mercados nuevos</p>
      </div>
      <div class="project__tags">
        <span class="tag">Build</span>
        <span class="tag">Grow</span>
      </div>
    </div>

    <div class="project__right">
      <div class="project__img-wrap">
        <img class="project__img" src="Assets/franui-foto.jpg" alt="Franuí">
        <a href="#" class="project__pill">ver más →</a>
      </div>
    </div>
  </section>


  <script>
    // Navbar: fondo al scrollear + ocultar/mostrar por dirección
    const navbar = document.getElementById('navbar');
    let lastY = 0;

    window.addEventListener('scroll', () => {
      const y = window.scrollY;

      // Fondo oscuro al salir del hero
      navbar.classList.toggle('scrolled', y > 60);

      // Ocultar al bajar (después de 80px), mostrar al subir
      if (y > lastY && y > 80) {
        navbar.classList.add('hidden');
      } else {
        navbar.classList.remove('hidden');
      }

      lastY = y;
    }, { passive: true });

    // Fade-up observer (elementos individuales)
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.1 });
    document.querySelectorAll('.fade-up').forEach(el => io.observe(el));

    // Transición de entrada del módulo Franuí (sección completa)
    const projectObs = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
          projectObs.unobserve(e.target);
        }
      });
    }, { threshold: 0.12 });
    document.querySelectorAll('.project').forEach(el => projectObs.observe(el));

    // Hero: disparar al cargar
    setTimeout(() => {
      document.querySelectorAll('.hero .fade-up').forEach((el, i) => {
        setTimeout(() => el.classList.add('visible'), i * 130);
      });
    }, 80);
  </script>
</body>
</html>
